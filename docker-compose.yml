# ──── 目标检测数据与算法评测平台 — 本地开发环境 ────
# 用法：docker-compose up -d
#       docker-compose down
#       docker-compose down -v
#
# Phase2 训练镜像：
#       docker compose --profile train build train-demo
#
# Windows 可选 .env：
#       TRAIN_HOST_JOBS_DIR=E:/学校有关/暑期岗位实习/Model_Group-main/data/train_jobs

version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql://postgres:123456@postgres:5432/detection_platform
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: change-me-to-a-random-secret-string
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: detection-platform
  MINIO_SECURE: "false"
  TRAIN_EXECUTOR: ${TRAIN_EXECUTOR:-docker}
  TRAIN_IMAGE: detection-train:demo
  TRAIN_JOBS_DIR: /data/train_jobs
  TRAIN_HOST_JOBS_DIR: ${TRAIN_HOST_JOBS_DIR:-}
  TRAIN_MAX_PARALLEL: "1"
  TRAIN_TIMEOUT_SEC: "3600"

services:
  postgres:
    image: postgres:16
    container_name: pg-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: detection_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  train-demo:
    build: ./backend/training/demo_trainer
    image: detection-train:demo
    profiles: ["train"]
    command: ["true"]

  api:
    build: ./backend
    container_name: api-local
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app
      - ./data/train_jobs:/data/train_jobs
    restart: unless-stopped

  celery-worker:
    build: ./backend
    container_name: celery-worker-local
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      <<: *backend-env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app
      - ./data/train_jobs:/data/train_jobs
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
