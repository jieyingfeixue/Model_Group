# ──── 目标检测数据与算法评测平台 — 本地开发环境 ────
# 用法：docker-compose up -d          # 启动全部服务
#       docker-compose down           # 停止并移除容器
#       docker-compose down -v        # 停止并删除数据卷（慎用）

version: "3.9"

services:
  # ──── PostgreSQL 16 数据库 ────
  postgres:
    image: postgres:16
    container_name: pg-local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: detection_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ──── Redis 7 缓存 ────
  redis:
    image: redis:7-alpine
    container_name: redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ──── MinIO 对象存储 ────
  minio:
    image: minio/minio
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
